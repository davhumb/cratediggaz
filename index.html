<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRATEDIGGAZ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fragment+Mono:ital@0;1&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --accent:#f5c518;--accent2:#ff3c3c;--accent3:#00e5ff;
  --text:#e8e8e8;--muted:#555;--muted2:#777;
  --owned:#39d353;--wish:#58a6ff;
  --h:100dvh;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Fragment Mono',monospace;font-size:12px;
  display:flex;flex-direction:column;height:var(--h);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── HEADER ── */
.header{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:48px;
  background:var(--bg);
  border-bottom:2px solid var(--accent);
  position:relative;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:.15em;
  color:var(--accent);
  line-height:1;
}
.logo-sub{
  font-size:9px;color:var(--muted2);
  letter-spacing:.2em;text-transform:uppercase;
  font-family:'Fragment Mono',monospace;
  margin-left:2px;align-self:flex-end;padding-bottom:3px;
}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center;}

/* ── BUTTONS ── */
.btn{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  font-family:'Fragment Mono',monospace;font-size:10px;
  padding:5px 10px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;
  transition:all .1s;white-space:nowrap;
}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.active{border-color:var(--accent);color:var(--accent);background:rgba(245,197,24,.06);}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;}
.btn.primary:hover{background:#ffd700;}
.btn.danger{border-color:var(--accent2);color:var(--accent2);}
.btn.danger:hover{background:rgba(255,60,60,.1);}
.btn.xs{padding:3px 7px;font-size:9px;}
.btn.icon{padding:5px 8px;font-size:14px;}

/* ── TOOLBAR ── */
.toolbar{
  flex-shrink:0;
  display:flex;gap:6px;align-items:center;
  padding:6px 14px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-wrap:nowrap;overflow-x:auto;
}
.toolbar::-webkit-scrollbar{height:0;}
.search-wrap{position:relative;flex-shrink:0;width:160px;}
.search-wrap input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Fragment Mono',monospace;font-size:11px;
  padding:5px 8px 5px 24px;outline:none;transition:border-color .1s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap::before{content:'⌕';position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.tb-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);
  font-family:'Fragment Mono',monospace;font-size:10px;padding:5px 7px;
  outline:none;cursor:pointer;flex-shrink:0;
}
.tb-select:focus{border-color:var(--accent);}
.view-toggle{display:flex;border:1px solid var(--border2);flex-shrink:0;margin-left:auto;}
.view-toggle .btn{border:none;padding:5px 9px;font-size:13px;}
.view-toggle .btn.active{background:var(--accent);color:#000;}

/* ── BPM BAR ── */
.bpm-bar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:4px 14px;background:rgba(245,197,24,.05);
  border-bottom:1px solid var(--border);font-size:10px;
}
.bpm-bar.hidden{display:none;}
.bpm-progress{flex:1;height:2px;background:var(--bg3);}
.bpm-fill{height:100%;background:var(--accent);transition:width .3s;}

/* ── STATS BAR ── */
.stats-bar{
  flex-shrink:0;display:flex;gap:16px;align-items:center;
  padding:4px 14px;background:var(--bg2);border-bottom:1px solid var(--border);
  font-size:10px;color:var(--muted2);letter-spacing:.05em;
  overflow-x:auto;
}
.stats-bar::-webkit-scrollbar{height:0;}
.stat{display:flex;gap:4px;align-items:center;white-space:nowrap;}
.sv{font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.sv.owned{color:var(--owned);}
.sv.wish{color:var(--wish);}
.sv.acc{color:var(--accent);}

/* ── MAIN CONTENT ── */
.content{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  min-height:0;
}

/* ── LIST ── */
.list-header{
  display:grid;
  grid-template-columns:28px 38px 1fr 70px 90px 55px 55px 44px;
  gap:4px;padding:4px 14px;
  font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg2);
}
.vinyl-list{
  flex:1;overflow-y:auto;
}
.vinyl-list::-webkit-scrollbar{width:4px;}
.vinyl-list::-webkit-scrollbar-track{background:var(--bg);}
.vinyl-list::-webkit-scrollbar-thumb{background:var(--border2);}

.vinyl-row{
  display:grid;
  grid-template-columns:28px 38px 1fr 70px 90px 55px 55px 44px;
  gap:4px;padding:5px 14px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;align-items:center;
}
.vinyl-row:hover{background:var(--bg3);}
.vinyl-row:active{background:var(--bg4);}
.col-num{color:var(--muted);font-size:10px;text-align:center;}
.col-title .artist{color:var(--accent);font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.05em;line-height:1.1;}
.col-title .album{color:var(--text);font-size:11px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-year{color:var(--muted2);font-size:10px;}
.col-label{color:var(--muted2);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-bpm{font-size:11px;color:var(--accent3);}
.col-mood .mood-badge{
  display:inline-block;font-size:8px;padding:1px 4px;
  letter-spacing:.05em;text-transform:uppercase;
  background:rgba(245,197,24,.08);color:var(--accent);
  border:1px solid rgba(245,197,24,.2);
}
.tag{display:inline-block;padding:1px 5px;font-size:8px;letter-spacing:.07em;text-transform:uppercase;border:1px solid;}
.tag.owned{color:var(--owned);border-color:var(--owned);background:rgba(57,211,83,.07);}
.tag.wishlist{color:var(--wish);border-color:var(--wish);background:rgba(88,166,255,.07);}
.col-actions{display:flex;gap:2px;justify-content:flex-end;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px 3px;transition:color .1s;line-height:1;}
.icon-btn:hover{color:var(--accent);}
.icon-btn.del:hover{color:var(--accent2);}

/* ── GRID ── */
.vinyl-grid-wrap{flex:1;overflow-y:auto;padding:12px 14px;}
.vinyl-grid-wrap::-webkit-scrollbar{width:4px;}
.vinyl-grid-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
.vinyl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.vinyl-card{background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.vinyl-card:hover{border-color:var(--accent);}
.card-cover{width:100%;aspect-ratio:1;background:var(--bg3);position:relative;overflow:hidden;}
.card-cover img{width:100%;height:100%;object-fit:cover;}
.disc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.disc{width:66%;aspect-ratio:1;border-radius:50%;background:repeating-radial-gradient(circle,#0d0d0d 0px,#1c1c1c 2px,#0d0d0d 3px,#181818 5px);display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(0,0,0,.9);position:relative;}
.disc::after{content:'';width:16%;aspect-ratio:1;border-radius:50%;background:var(--accent);opacity:.5;}
.disc-inner{position:absolute;width:30%;aspect-ratio:1;border-radius:50%;}
.card-status{position:absolute;top:4px;right:4px;}
.card-body{padding:7px 8px 9px;}
.card-artist{color:var(--accent);font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-album{color:var(--text);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.card-meta{color:var(--muted2);font-size:9px;display:flex;justify-content:space-between;}
.card-actions{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(0,0,0,.92);opacity:0;transition:opacity .12s;padding:4px 7px;gap:4px;justify-content:flex-end;}
.vinyl-card:hover .card-actions{opacity:1;}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;padding:20px;}
.empty-icon{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--border2);line-height:1;margin-bottom:10px;}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--muted2);letter-spacing:.1em;margin-bottom:6px;text-transform:uppercase;}
.empty p{font-size:11px;margin-bottom:16px;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.overlay.hidden{display:none;}
.overlay.center{align-items:center;}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-top:2px solid var(--accent);
  width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;
  padding:20px;position:relative;
}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);}
.modal-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  color:var(--accent);margin-bottom:14px;letter-spacing:.1em;
}
.close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;}
.close-btn:hover{color:var(--text);}

/* ── FORM ── */
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Fragment Mono',monospace;font-size:11px;
  padding:6px 8px;outline:none;transition:border-color .1s;resize:none;
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}

/* ── DISCOGS ── */
.discogs-block{margin-bottom:12px;padding:10px;background:var(--bg3);border-left:2px solid var(--accent);}
.discogs-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.discogs-row{display:flex;gap:5px;}
.discogs-row input{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'Fragment Mono',monospace;font-size:11px;padding:5px 8px;outline:none;}
.discogs-row input:focus{border-color:var(--accent);}
.discogs-results{margin-top:6px;max-height:170px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.discogs-result{padding:5px 7px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:8px;}
.discogs-result:hover{border-color:var(--accent);}
.dr-thumb{width:32px;height:32px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.dr-info{flex:1;min-width:0;}
.dr-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-sub{font-size:9px;color:var(--muted2);}
.d-status{font-size:10px;color:var(--muted2);padding:4px 0;text-align:center;font-style:italic;}

/* ── DETAIL ── */
.detail-modal .modal{max-width:460px;}
.detail-head{display:flex;gap:12px;margin-bottom:12px;}
.detail-cover{width:80px;height:80px;object-fit:cover;flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);}
.detail-cover-ph{width:80px;height:80px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:24px;flex-shrink:0;border:1px solid var(--border2);}
.detail-meta{flex:1;min-width:0;}
.detail-artist{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:.08em;line-height:1;}
.detail-album{font-size:12px;color:var(--text);margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;font-weight:600;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:12px;}
.tab{padding:5px 12px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-bottom:10px;}
.df label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:1px;}
.df span{font-size:11px;color:var(--text);}
.detail-note{background:var(--bg3);border-left:2px solid var(--accent);padding:8px 10px;font-size:11px;color:var(--text);line-height:1.5;font-style:italic;}

/* ── TRACKLIST ── */
.tracklist{display:flex;flex-direction:column;gap:1px;}
.track-row{display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--bg3);border:1px solid transparent;}
.track-pos{color:var(--muted);font-size:9px;width:20px;flex-shrink:0;text-align:right;font-family:'Barlow Condensed',sans-serif;}
.track-title{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-dur{color:var(--muted2);font-size:9px;flex-shrink:0;}
.track-bpm-field{width:52px;flex-shrink:0;}
.track-bpm-field input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--accent3);font-family:'Fragment Mono',monospace;font-size:10px;padding:2px 4px;outline:none;text-align:center;}
.track-bpm-field input:focus{border-color:var(--accent);}
.bpm-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.bpm-dot.found{background:var(--owned);}
.bpm-dot.missing{background:var(--border2);}
.bpm-dot.loading{background:var(--accent);animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.tl-loading{text-align:center;padding:16px;color:var(--muted);font-size:11px;}
.tl-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.track-sample{font-size:9px;color:var(--muted);font-style:italic;}

/* ── STATS ── */
.stats-modal .modal{max-width:440px;}
.ss{margin-bottom:14px;}
.ss h3{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.sr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(42,42,42,.6);font-size:11px;}
.sr:last-child{border:none;}
.sr .k{color:var(--muted2);}
.sr .v{color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;}
.bc{display:flex;flex-direction:column;gap:4px;}
.bi{display:flex;align-items:center;gap:6px;}
.bl{width:80px;font-size:9px;color:var(--muted2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bt{flex:1;height:4px;background:var(--bg3);}
.bf{height:100%;background:var(--accent);transition:width .4s;}
.bc2{background:var(--wish);}
.bn{width:20px;font-size:9px;color:var(--muted);text-align:right;}

/* ── CONFIG ── */
.config-modal .modal{max-width:400px;}
.cs{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.cs:last-child{border:none;margin:0;padding:0;}
.cs h3{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.hint{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.5;}
.hint a{color:var(--accent);text-decoration:none;}

/* ── FOOTER ── */
.footer{flex-shrink:0;text-align:center;padding:4px;font-size:9px;color:var(--muted);border-top:1px solid var(--border);background:var(--bg);}
.footer a{color:var(--accent);text-decoration:none;}

/* ── MOBILE ── */
@media(max-width:600px){
  .list-header,.vinyl-row{grid-template-columns:24px 34px 1fr 55px 42px 38px;}
  .list-header :nth-child(5),.list-header :nth-child(6),.list-header :nth-child(7){display:none;}
  .vinyl-row .col-label,.vinyl-row .col-mood{display:none;}
  .vinyl-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  .search-wrap{width:130px;}
  .fg2,.fg3{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" id="logoBtn" onclick="handleLogoClick()">CRATEDIGGAZ</div>
  <div class="logo-sub">// HIP-HOP VINYL</div>
  <div class="header-right">
    <button class="btn icon" onclick="openConfig()" title="Config">⚙</button>
    <button class="btn xs" onclick="openStats()">STATS</button>
    <button class="btn primary" onclick="openAddModal()">+ ADD</button>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search..." oninput="render()">
  </div>
  <select class="tb-select" id="filterStatus" onchange="render()">
    <option value="">All</option>
    <option value="owned">Owned</option>
    <option value="wishlist">Wish</option>
  </select>
  <select class="tb-select" id="filterEra" onchange="render()">
    <option value="">Era</option>
    <option value="80s">80s</option>
    <option value="88-94">Golden Age</option>
    <option value="95-99">95–99</option>
    <option value="00s">2000s</option>
    <option value="10s">2010s</option>
    <option value="20s">2020s</option>
  </select>
  <select class="tb-select" id="filterMood" onchange="render()">
    <option value="">Style</option>
    <option>Boom Bap</option><option>Jazz Rap</option><option>West Coast</option>
    <option>East Coast</option><option>Gangsta</option><option>Underground</option>
    <option>Lo-Fi</option><option>Conscious</option><option>Instrumental</option><option>Autre</option>
  </select>
  <select class="tb-select" id="sortBy" onchange="render()">
    <option value="added">Recent</option>
    <option value="artist">Artist A→Z</option>
    <option value="year_asc">Year ↑</option>
    <option value="year_desc">Year ↓</option>
    <option value="bpm_asc">BPM ↑</option>
    <option value="bpm_desc">BPM ↓</option>
  </select>
  <div class="view-toggle">
    <button class="btn active" id="btnList" onclick="setView('list')" title="List">☰</button>
    <button class="btn" id="btnGrid" onclick="setView('grid')" title="Grid">▦</button>
  </div>
</div>

<div class="bpm-bar hidden" id="bpmBar">
  <span style="color:var(--accent);font-size:10px" id="bpmStatus">BPM...</span>
  <div class="bpm-progress"><div class="bpm-fill" id="bpmFill" style="width:0%"></div></div>
  <span style="color:var(--muted);font-size:9px" id="bpmCount"></span>
  <button class="btn xs" onclick="pauseBpmQueue()">⏸</button>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="content" id="mainContent">
  <div id="listHeader" class="list-header">
    <span>#</span><span></span><span>ARTIST / ALBUM</span>
    <span>YEAR</span><span>LABEL</span><span>BPM</span><span>STYLE</span><span>STATUS</span><span></span>
  </div>
  <div id="vinylContainer" class="vinyl-list"></div>
</div>

<div class="footer">BPM data — <a href="https://getsongbpm.com" target="_blank">GetSongBPM.com</a></div>

<!-- ADD/EDIT -->
<div class="overlay hidden" id="addOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('addOverlay')">✕</button>
    <div class="modal-title" id="modalTitle">NEW VINYL</div>
    <div class="discogs-block" id="discogsPanel">
      <div class="discogs-lbl">◈ Discogs auto-fill</div>
      <div class="discogs-row">
        <input type="text" id="discogsQuery" placeholder="Artist — Album..." onkeydown="if(event.key==='Enter')searchDiscogs()">
        <button class="btn xs primary" onclick="searchDiscogs()">GO</button>
      </div>
      <div id="discogsResults"></div>
    </div>
    <div class="form-row"><label>Artist *</label><input type="text" id="fArtist" placeholder="Gang Starr"></div>
    <div class="form-row"><label>Album *</label><input type="text" id="fAlbum" placeholder="Step in the Arena"></div>
    <div class="fg3">
      <div class="form-row"><label>Year</label><input type="number" id="fYear" placeholder="1991"></div>
      <div class="form-row"><label>BPM</label><input type="number" id="fBpm" placeholder="92"></div>
      <div class="form-row"><label>Status</label>
        <select id="fStatus"><option value="owned">Owned ✓</option><option value="wishlist">Wish ◯</option></select>
      </div>
    </div>
    <div class="fg2">
      <div class="form-row"><label>Label</label><input type="text" id="fLabel"></div>
      <div class="form-row"><label>Style</label>
        <select id="fMood"><option value="">—</option>
          <option>Boom Bap</option><option>Jazz Rap</option><option>West Coast</option>
          <option>East Coast</option><option>Gangsta</option><option>Underground</option>
          <option>Lo-Fi</option><option>Conscious</option><option>Instrumental</option><option>Autre</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Producer(s)</label><input type="text" id="fProducer"></div>
    <div class="form-row"><label>Sample sources</label><input type="text" id="fSample"></div>
    <div class="form-row"><label>Notes</label><textarea id="fNote" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addOverlay')">Cancel</button>
      <button class="btn primary" onclick="saveVinyl()">SAVE</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="overlay center hidden detail-modal" id="detailOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('detailOverlay')">✕</button>
    <div id="detailContent"></div>
    <div class="modal-footer">
      <button class="btn danger xs" onclick="deleteFromDetail()">Delete</button>
      <button class="btn xs" onclick="editFromDetail()">Edit</button>
      <button class="btn primary xs" onclick="closeModal('detailOverlay')">Close</button>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="overlay center hidden stats-modal" id="statsOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('statsOverlay')">✕</button>
    <div class="modal-title">STATS</div>
    <div id="statsContent"></div>
    <div class="modal-footer"><button class="btn primary xs" onclick="closeModal('statsOverlay')">Close</button></div>
  </div>
</div>

<!-- CONFIG -->
<div class="overlay center hidden config-modal" id="configOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('configOverlay')">✕</button>
    <div class="modal-title">CONFIG</div>
    <div class="cs">
      <h3>Discogs</h3>
      <div class="form-row"><label>Token</label><input type="text" id="tokenDiscogs" placeholder="Discogs personal token..."></div>
      <div class="hint"><a href="https://www.discogs.com/settings/developers" target="_blank">discogs.com/settings/developers</a></div>
    </div>
    <div class="cs">
      <h3>GetSongBPM</h3>
      <div class="form-row"><label>API Key</label><input type="text" id="tokenBpm" placeholder="API key..."></div>
      <div class="hint"><a href="https://getsongbpm.com/api" target="_blank">getsongbpm.com/api</a> — 100 req/day</div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn xs primary" onclick="startBpmQueue()">▶ RUN BPM AUTO</button>
        <button class="btn xs" onclick="clearBpmQueue()">Reset queue</button>
      </div>
      <div class="hint" style="margin-top:5px" id="bpmQueueInfo"></div>
    </div>
    <div class="modal-footer">
      <button class="btn xs" onclick="closeModal('configOverlay')">Cancel</button>
      <button class="btn primary xs" onclick="saveConfig()">SAVE</button>
    </div>
  </div>
</div>

<!-- DEV MODE -->
<div class="overlay center hidden" id="devOverlay">
  <div class="modal" style="max-width:420px;border-top-color:var(--accent2)">
    <button class="close-btn" onclick="closeModal('devOverlay')">✕</button>
    <div class="modal-title" style="color:var(--accent2)">DEV MODE</div>

    <div class="cs" style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px">
      <h3 style="color:var(--muted)">SYSTEM INFO</h3>
      <div id="devInfo"></div>
    </div>

    <div class="cs" style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px">
      <h3 style="color:var(--muted)">BPM API TEST</h3>
      <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <button class="btn xs primary" onclick="devTestBpm()">Test search</button>
        <input type="text" id="devSongId" placeholder="Song ID..." style="flex:1;min-width:80px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Fragment Mono',monospace;font-size:10px;padding:3px 7px;outline:none;">
        <button class="btn xs" onclick="devTestBpmSong()">Get song</button>
      </div>
      <div id="devTestResult" style="font-size:10px;color:var(--accent3);line-height:1.5;word-break:break-all;min-height:20px"></div>
    </div>

    <div class="cs">
      <h3 style="color:var(--muted)">DATA</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn xs" onclick="devExportData()">⬇ Export JSON</button>
        <button class="btn xs" onclick="devImportData()">⬆ Import JSON</button>
        <button class="btn xs" onclick="devClearBpms()">Clear BPMs</button>
        <button class="btn xs danger" onclick="devClearAll()">⚠ Clear all</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
let vinyls=JSON.parse(localStorage.getItem('csp_vinyls')||'[]');
let currentView=localStorage.getItem('csp_view')||'list';
let editId=null,detailId=null,bpmRunning=false;
let bpmQueue=[];

function save(){localStorage.setItem('csp_vinyls',JSON.stringify(vinyls));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getEra(y){if(!y)return null;y=parseInt(y);if(y<1988)return'80s';if(y<=1994)return'88-94';if(y<=1999)return'95-99';if(y<=2009)return'00s';if(y<=2019)return'10s';return'20s';}
const dc=['#7a2a2a','#2a4c7a','#2a6a42','#6a5420','#5a2a7a','#1a6a6a','#7a3a20'];
function discColor(a){let h=0;for(let c of(a||''))h=(h*31+c.charCodeAt(0))&0xffff;return dc[h%dc.length];}

// ── FILTER/SORT ───────────────────────────────────────
function getSorted(arr){
  const s=document.getElementById('sortBy').value;
  return[...arr].sort((a,b)=>{
    if(s==='artist')return(a.artist||'').localeCompare(b.artist||'');
    if(s==='year_asc')return(parseInt(a.year)||9999)-(parseInt(b.year)||9999);
    if(s==='year_desc')return(parseInt(b.year)||0)-(parseInt(a.year)||0);
    if(s==='bpm_asc')return(parseInt(a.bpm)||9999)-(parseInt(b.bpm)||9999);
    if(s==='bpm_desc')return(parseInt(b.bpm)||0)-(parseInt(a.bpm)||0);
    return(b.added||0)-(a.added||0);
  });
}
function filtered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const st=document.getElementById('filterStatus').value;
  const era=document.getElementById('filterEra').value;
  const mood=document.getElementById('filterMood').value;
  return vinyls.filter(v=>{
    const mQ=!q||[v.artist,v.album,v.label,v.producer,v.note].some(f=>(f||'').toLowerCase().includes(q));
    return mQ&&(!st||v.status===st)&&(!era||getEra(v.year)===era)&&(!mood||v.mood===mood);
  });
}

// ── RENDER ────────────────────────────────────────────
function coverThumb(v,size){
  if(v.coverUrl)return`<img src="${esc(v.coverUrl)}" style="width:${size}px;height:${size}px;object-fit:cover" onerror="this.style.display='none'">`;
  return`<div style="width:${size}px;height:${size}px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:${Math.round(size*.4)}px">◎</div>`;
}

function setView(v){
  currentView=v;localStorage.setItem('csp_view',v);
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('btnGrid').classList.toggle('active',v==='grid');
  const mc=document.getElementById('mainContent');
  const lh=document.getElementById('listHeader');
  const vc=document.getElementById('vinylContainer');
  if(v==='list'){
    mc.style.flexDirection='column';
    lh.style.display='grid';
    vc.className='vinyl-list';
  } else {
    mc.style.flexDirection='column';
    lh.style.display='none';
    vc.className='vinyl-grid-wrap';
  }
  render();
}

function render(){
  const data=getSorted(filtered());
  const owned=vinyls.filter(v=>v.status==='owned').length;
  const wish=vinyls.filter(v=>v.status==='wishlist').length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><span class="sv acc">${vinyls.length}</span> TOTAL</div>
    <div class="stat"><span class="sv owned">${owned}</span> OWNED</div>
    <div class="stat"><span class="sv wish">${wish}</span> WISH</div>
    <div class="stat"><span class="sv acc">${data.length}</span> SHOWN</div>`;

  const vc=document.getElementById('vinylContainer');

  if(data.length===0){
    document.getElementById('listHeader').style.display='none';
    vc.className='';
    vc.innerHTML=`<div class="empty"><div class="empty-icon">◎</div>
      <h3>${vinyls.length===0?'CRATE IS EMPTY':'NO RESULTS'}</h3>
      <p style="font-size:11px;color:var(--muted)">${vinyls.length===0?'Add your first vinyl.':'Adjust filters.'}</p>
      ${vinyls.length===0?'<button class="btn primary" onclick="openAddModal()">+ ADD VINYL</button>':''}
    </div>`;return;
  }

  if(currentView==='list'){
    document.getElementById('listHeader').style.display='grid';
    vc.className='vinyl-list';
    vc.innerHTML=data.map((v,i)=>`
      <div class="vinyl-row" onclick="openDetail('${v.id}')">
        <span class="col-num">${i+1}</span>
        <span>${coverThumb(v,34)}</span>
        <div class="col-title"><div class="artist">${esc(v.artist)}</div><div class="album">${esc(v.album)}</div></div>
        <span class="col-year">${v.year||'—'}</span>
        <span class="col-label">${esc(v.label||'—')}</span>
        <span class="col-bpm">${v.bpm?esc(v.bpm):'—'}</span>
        <span class="col-mood">${v.mood?`<span class="mood-badge">${esc(v.mood)}</span>`:''}</span>
        <span><span class="tag ${v.status}">${v.status==='owned'?'✓':'◯'}</span></span>
        <div class="col-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="editVinyl('${v.id}')">✎</button>
          <button class="icon-btn del" onclick="deleteVinyl('${v.id}')">✕</button>
        </div>
      </div>`).join('');
  } else {
    document.getElementById('listHeader').style.display='none';
    vc.className='vinyl-grid-wrap';
    vc.innerHTML=`<div class="vinyl-grid">`+data.map(v=>`
      <div class="vinyl-card" onclick="openDetail('${v.id}')">
        <div class="card-cover">
          ${v.coverUrl
            ?`<img src="${esc(v.coverUrl)}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='<div class=disc-ph><div class=disc style=position:relative><div class=disc-inner style=background:${discColor(v.artist)};opacity:.6></div></div></div>'">`
            :`<div class="disc-ph"><div class="disc" style="position:relative"><div class="disc-inner" style="background:${discColor(v.artist)};opacity:.6"></div></div></div>`}
          <div class="card-status"><span class="tag ${v.status}">${v.status==='owned'?'✓':'◯'}</span></div>
        </div>
        <div class="card-body">
          <div class="card-artist">${esc(v.artist)}</div>
          <div class="card-album">${esc(v.album)}</div>
          <div class="card-meta">
            <span>${v.year||'—'}</span>
            <span style="color:var(--accent3)">${v.bpm?esc(v.bpm)+' bpm':''}</span>
          </div>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="editVinyl('${v.id}')">✎</button>
          <button class="icon-btn del" onclick="deleteVinyl('${v.id}')">✕</button>
        </div>
      </div>`).join('')+`</div>`;
  }
}

// ── MODALS ────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.add('hidden');}

function openAddModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='NEW VINYL';
  ['fArtist','fAlbum','fYear','fBpm','fLabel','fProducer','fSample','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fMood').value='';document.getElementById('fStatus').value='owned';
  document.getElementById('discogsResults').innerHTML='';document.getElementById('discogsQuery').value='';
  const ht=!!localStorage.getItem('discogs_token');
  document.getElementById('discogsPanel').style.display=ht?'block':'none';
  window._pendingCover=null;window._pendingReleaseId=null;
  document.getElementById('addOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById(ht?'discogsQuery':'fArtist').focus(),80);
}

function editVinyl(id){
  const v=vinyls.find(x=>x.id===id);if(!v)return;
  editId=id;
  document.getElementById('modalTitle').textContent='EDIT VINYL';
  document.getElementById('fArtist').value=v.artist||'';
  document.getElementById('fAlbum').value=v.album||'';
  document.getElementById('fYear').value=v.year||'';
  document.getElementById('fBpm').value=v.bpm||'';
  document.getElementById('fLabel').value=v.label||'';
  document.getElementById('fMood').value=v.mood||'';
  document.getElementById('fStatus').value=v.status||'owned';
  document.getElementById('fProducer').value=v.producer||'';
  document.getElementById('fSample').value=v.sample||'';
  document.getElementById('fNote').value=v.note||'';
  document.getElementById('discogsResults').innerHTML='';document.getElementById('discogsQuery').value='';
  const ht=!!localStorage.getItem('discogs_token');
  document.getElementById('discogsPanel').style.display=ht?'block':'none';
  document.getElementById('addOverlay').classList.remove('hidden');
}

function saveVinyl(){
  const artist=document.getElementById('fArtist').value.trim();
  const album=document.getElementById('fAlbum').value.trim();
  if(!artist||!album){alert('Artist and album required.');return;}
  const data={artist,album,
    year:document.getElementById('fYear').value.trim(),
    bpm:document.getElementById('fBpm').value.trim(),
    label:document.getElementById('fLabel').value.trim(),
    mood:document.getElementById('fMood').value,
    status:document.getElementById('fStatus').value,
    producer:document.getElementById('fProducer').value.trim(),
    sample:document.getElementById('fSample').value.trim(),
    note:document.getElementById('fNote').value.trim(),
  };
  if(!editId&&window._pendingCover)data.coverUrl=window._pendingCover;
  if(!editId&&window._pendingReleaseId)data.discogsReleaseId=window._pendingReleaseId;
  window._pendingCover=null;window._pendingReleaseId=null;
  if(editId){const i=vinyls.findIndex(v=>v.id===editId);vinyls[i]={...vinyls[i],...data};}
  else vinyls.push({id:uid(),added:Date.now(),...data});
  save();closeModal('addOverlay');render();
}

function deleteVinyl(id){if(!confirm('Delete this vinyl?'))return;vinyls=vinyls.filter(v=>v.id!==id);save();render();}

// ── DETAIL ────────────────────────────────────────────
let currentTab='info';
function openDetail(id){
  const v=vinyls.find(x=>x.id===id);if(!v)return;
  detailId=id;currentTab='info';
  renderDetail(v);
  document.getElementById('detailOverlay').classList.remove('hidden');
}
function renderDetail(v){
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-head">
      ${v.coverUrl
        ?`<img class="detail-cover" src="${esc(v.coverUrl)}" onerror="this.outerHTML='<div class=detail-cover-ph>◎</div>'">`
        :`<div class="detail-cover-ph">◎</div>`}
      <div class="detail-meta">
        <div class="detail-artist">${esc(v.artist)}</div>
        <div class="detail-album">${esc(v.album)}</div>
        <span class="tag ${v.status}">${v.status==='owned'?'✓ OWNED':'◯ WISH'}</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('info','${v.id}',this)">INFO</div>
      <div class="tab" onclick="switchTab('tracklist','${v.id}',this)">TRACKLIST</div>
    </div>
    <div id="tabInfo" class="tab-panel active">
      <div class="detail-grid">
        <div class="df"><label>Year</label><span>${v.year||'—'}</span></div>
        <div class="df"><label>BPM</label><span style="color:var(--accent3)">${v.bpm?v.bpm+' bpm':'—'}</span></div>
        <div class="df"><label>Label</label><span>${esc(v.label||'—')}</span></div>
        <div class="df"><label>Style</label><span>${esc(v.mood||'—')}</span></div>
        ${v.producer?`<div class="df" style="grid-column:1/-1"><label>Producer</label><span>${esc(v.producer)}</span></div>`:''}
        ${v.sample?`<div class="df" style="grid-column:1/-1"><label>Samples</label><span>${esc(v.sample)}</span></div>`:''}
      </div>
      ${v.note?`<div class="detail-note">${esc(v.note)}</div>`:''}
    </div>
    <div id="tabTracklist" class="tab-panel">
      <div id="tracklistContent"><div class="tl-loading">Loading...</div></div>
    </div>`;
}

function switchTab(tab,vid,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='tracklist'){const v=vinyls.find(x=>x.id===vid);if(v)loadTracklist(v);}
}

async function loadTracklist(v){
  const el=document.getElementById('tracklistContent');if(!el)return;
  if(v.tracklist&&v.tracklist.length>0){renderTracklist(v);return;}
  if(!v.discogsReleaseId){
    el.innerHTML=`<div class="tl-loading">No Discogs ID — import via Discogs search to get tracklist.</div>`;return;
  }
  el.innerHTML=`<div class="tl-loading">Loading from Discogs...</div>`;
  try{
    const token=localStorage.getItem('discogs_token');
    const url=`https://api.discogs.com/releases/${v.discogsReleaseId}${token?'?token='+token:''}`;
    let data;
    try{const r=await fetch(url);if(!r.ok)throw new Error();data=await r.json();}
    catch{const r2=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);data=await r2.json();}
    if(data.tracklist&&data.tracklist.length>0){
      const vi=vinyls.findIndex(x=>x.id===v.id);
      vinyls[vi].tracklist=data.tracklist.map(t=>({pos:t.position,title:t.title,duration:t.duration,extraartists:t.extraartists,bpm:null}));
      save();renderTracklist(vinyls[vi]);
    } else {el.innerHTML=`<div class="tl-loading">Tracklist not available on Discogs.</div>`;}
  }catch{el.innerHTML=`<div class="tl-loading" style="color:var(--accent2)">Error loading tracklist.</div>`;}
}

function renderTracklist(v){
  const el=document.getElementById('tracklistContent');if(!el)return;
  const bpmKey=localStorage.getItem('bpm_api_key');
  const tracks=v.tracklist||[];
  if(!tracks.length){el.innerHTML='<div class="tl-loading">No tracks.</div>';return;}
  el.innerHTML=`
    <div class="tl-actions">
      <span style="font-size:9px;color:var(--muted)">${tracks.length} TRACKS</span>
      ${bpmKey?`<button class="btn xs primary" onclick="fetchBpmForVinyl('${v.id}')">▶ BPM AUTO</button>`:`<button class="btn xs" onclick="openConfig()">Config BPM ⚙</button>`}
    </div>
    <div class="tracklist">
      ${tracks.map((t,i)=>`
        <div class="track-row">
          <span class="track-pos">${esc(t.pos||String(i+1))}</span>
          <div style="flex:1;min-width:0">
            <div class="track-title">${esc(t.title)}</div>
            ${t.extraartists&&t.extraartists.length?`<div class="track-sample">${t.extraartists.map(a=>esc(a.name)).join(', ')}</div>`:''}
          </div>
          <span class="track-dur">${esc(t.duration||'')}</span>
          <div class="track-bpm-field">
            <input type="number" value="${t.bpm||''}" placeholder="bpm" min="40" max="250"
              onchange="updateTrackBpm('${v.id}',${i},this.value)" id="tbpm_${v.id}_${i}">
          </div>
          <div class="bpm-dot ${t.bpm?'found':'missing'}" id="bdot_${v.id}_${i}"></div>
        </div>`).join('')}
    </div>`;
}

function updateTrackBpm(vid,idx,val){
  const vi=vinyls.findIndex(v=>v.id===vid);if(vi<0)return;
  vinyls[vi].tracklist[idx].bpm=val?parseInt(val):null;save();
  const dot=document.getElementById(`bdot_${vid}_${idx}`);
  if(dot)dot.className='bpm-dot '+(val?'found':'missing');
}

// ── BPM FETCH (single vinyl) ─────────────────────────
async function fetchBpmForVinyl(vid){
  const key=localStorage.getItem('bpm_api_key');if(!key){openConfig();return;}
  const vi=vinyls.findIndex(v=>v.id===vid);if(vi<0)return;
  const v=vinyls[vi];
  if(!v.tracklist||!v.tracklist.length)return;
  for(let i=0;i<v.tracklist.length;i++){
    const t=v.tracklist[i];if(t.bpm)continue;
    const dot=document.getElementById(`bdot_${vid}_${i}`);
    if(dot)dot.className='bpm-dot loading';
    await fetchOneBpm(key,v.artist,t.title,vid,i);
    await new Promise(r=>setTimeout(r,1500));
  }
}

async function bpmFetch(url){
  try{
    const r=await fetch(url);
    if(!r.ok)throw new Error('status '+r.status);
    return await r.json();
  }catch{
    const proxy=`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
    const r2=await fetch(proxy);
    if(!r2.ok)throw new Error('proxy error '+r2.status);
    return await r2.json();
  }
}

async function fetchOneBpm(key,artist,title,vid,trackIdx){
  const dot=document.getElementById(`bdot_${vid}_${trackIdx}`);
  try{
    const q=encodeURIComponent(artist+' '+title);
    const d1=await bpmFetch(`https://api.getsongbpm.com/search/?api_key=${key}&type=song&lookup=${q}`);
    if(d1.search&&d1.search.length>0){
      const songId=d1.search[0].id;
      await new Promise(r=>setTimeout(r,800));
      const d2=await bpmFetch(`https://api.getsongbpm.com/song/?api_key=${key}&id=${songId}`);
      const bpm=d2.song&&d2.song.tempo?parseInt(d2.song.tempo):null;
      if(bpm){
        const vi=vinyls.findIndex(v=>v.id===vid);
        if(vi>=0&&vinyls[vi].tracklist[trackIdx]){
          vinyls[vi].tracklist[trackIdx].bpm=bpm;save();
          const inp=document.getElementById(`tbpm_${vid}_${trackIdx}`);
          if(inp)inp.value=bpm;
          if(dot)dot.className='bpm-dot found';
          return;
        }
      }
    }
    if(dot)dot.className='bpm-dot missing';
  }catch(e){console.warn('BPM error',e);if(dot)dot.className='bpm-dot missing';}
}
// ── BPM QUEUE (batch) ─────────────────────────────────
function startBpmQueue(){
  const key=localStorage.getItem('bpm_api_key');
  if(!key){alert('Add your GetSongBPM key in ⚙ first.');openConfig();return;}
  bpmQueue=[];
  vinyls.forEach(v=>{
    if(!v.tracklist)return;
    v.tracklist.forEach((t,i)=>{if(!t.bpm)bpmQueue.push({vid:v.id,idx:i,artist:v.artist,title:t.title});});
  });
  if(!bpmQueue.length){alert('All BPMs already filled!');return;}
  closeModal('configOverlay');
  bpmRunning=true;
  processBpmQueue();
}

async function processBpmQueue(){
  const key=localStorage.getItem('bpm_api_key');
  const bar=document.getElementById('bpmBar');
  const fill=document.getElementById('bpmFill');
  const status=document.getElementById('bpmStatus');
  const count=document.getElementById('bpmCount');
  const total=bpmQueue.length;let done=0;
  bar.classList.remove('hidden');
  while(bpmQueue.length>0&&bpmRunning){
    const item=bpmQueue[0];
    status.textContent=`BPM: ${esc(item.artist)} — ${esc(item.title)}`;
    count.textContent=`${done}/${total}`;
    fill.style.width=`${(done/total*100).toFixed(1)}%`;
    try{
      const q=encodeURIComponent(item.artist+' '+item.title);
      const d1=await bpmFetch(`https://api.getsongbpm.com/search/?api_key=${key}&type=song&lookup=${q}`);
      if(d1.search&&d1.search.length>0){
        const songId=d1.search[0].id;
        await new Promise(r=>setTimeout(r,800));
        const d2=await bpmFetch(`https://api.getsongbpm.com/song/?api_key=${key}&id=${songId}`);
        const bpm=d2.song&&d2.song.tempo?parseInt(d2.song.tempo):null;
        if(bpm){
          const vi=vinyls.findIndex(v=>v.id===item.vid);
          if(vi>=0&&vinyls[vi].tracklist[item.idx]){vinyls[vi].tracklist[item.idx].bpm=bpm;save();}
        }
      }
    }catch(e){console.warn('BPM queue error',e);}
    bpmQueue.shift();done++;
    await new Promise(r=>setTimeout(r,1200));
  }
  fill.style.width='100%';
  status.textContent=bpmRunning?`✓ Done — ${done} tracks`:'⏸ Paused';
  count.textContent='';bpmRunning=false;
  setTimeout(()=>bar.classList.add('hidden'),4000);
  render();
}

function pauseBpmQueue(){bpmRunning=false;}
function clearBpmQueue(){bpmQueue=[];bpmRunning=false;document.getElementById('bpmBar').classList.add('hidden');}

// ── DISCOGS ───────────────────────────────────────────
async function searchDiscogs(){
  const token=localStorage.getItem('discogs_token');if(!token){openConfig();return;}
  const q=document.getElementById('discogsQuery').value.trim();if(!q)return;
  const res=document.getElementById('discogsResults');
  res.innerHTML='<div class="d-status">Searching...</div>';
  try{
    const du=`https://api.discogs.com/database/search?q=${encodeURIComponent(q)}&type=release&per_page=8&token=${token}`;
    let data;
    try{const r=await fetch(du);if(!r.ok)throw new Error();data=await r.json();}
    catch{const r2=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(du)}`);if(!r2.ok)throw new Error('Error '+r2.status);data=await r2.json();}
    if(!data.results||!data.results.length){res.innerHTML='<div class="d-status">No results.</div>';return;}
    res.innerHTML=data.results.map(item=>`
      <div class="discogs-result" onclick='fillFromDiscogs(${JSON.stringify(item).replace(/'/g,"&#39;")})'>
        ${item.cover_image&&!item.cover_image.includes('spacer')
          ?`<img class="dr-thumb" src="${esc(item.cover_image)}" onerror="this.style.display='none'">`
          :`<div class="dr-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--muted)">◎</div>`}
        <div class="dr-info">
          <div class="dr-title">${esc(item.title)}</div>
          <div class="dr-sub">${esc(item.label?item.label[0]:'')}${item.year?' · '+item.year:''}${item.genre?' · '+item.genre[0]:''}</div>
        </div>
      </div>`).join('');
  }catch(e){res.innerHTML=`<div class="d-status" style="color:var(--accent2)">Error: ${esc(e.message)}</div>`;}
}

function fillFromDiscogs(item){
  const parts=(item.title||'').split(' - ');
  document.getElementById('fArtist').value=parts[0]||'';
  document.getElementById('fAlbum').value=parts.slice(1).join(' - ')||'';
  if(item.year)document.getElementById('fYear').value=item.year;
  if(item.label&&item.label[0])document.getElementById('fLabel').value=item.label[0];
  window._pendingCover=item.cover_image&&!item.cover_image.includes('spacer')?item.cover_image:null;
  window._pendingReleaseId=item.id||null;
  const g=item.genre?item.genre[0]||'':'';
  const map={'Jazz':'Jazz Rap','Funk':'Boom Bap','Soul':'Boom Bap','Hip Hop':'Boom Bap','Rap':'East Coast'};
  const found=Object.keys(map).find(k=>g.includes(k));
  if(found)document.getElementById('fMood').value=map[found];
  res=document.getElementById('discogsResults');
  res.innerHTML=`<div class="d-status" style="color:var(--owned)">✓ Imported — check & complete.</div>`;
}

// ── CONFIG ────────────────────────────────────────────
function openConfig(){
  document.getElementById('tokenDiscogs').value=localStorage.getItem('discogs_token')||'';
  document.getElementById('tokenBpm').value=localStorage.getItem('bpm_api_key')||'';
  const twb=vinyls.reduce((a,v)=>a+(v.tracklist?v.tracklist.filter(t=>!t.bpm).length:0),0);
  const tt=vinyls.reduce((a,v)=>a+(v.tracklist?v.tracklist.length:0),0);
  document.getElementById('bpmQueueInfo').textContent=tt?`${twb} tracks without BPM / ${tt} total`:'No tracklist loaded yet — open vinyl sheets first.';
  document.getElementById('configOverlay').classList.remove('hidden');
}
function saveConfig(){
  const dt=document.getElementById('tokenDiscogs').value.trim();
  const bt=document.getElementById('tokenBpm').value.trim();
  if(dt)localStorage.setItem('discogs_token',dt);else localStorage.removeItem('discogs_token');
  if(bt)localStorage.setItem('bpm_api_key',bt);else localStorage.removeItem('bpm_api_key');
  closeModal('configOverlay');
}

// ── STATS ─────────────────────────────────────────────
function openStats(){
  const owned=vinyls.filter(v=>v.status==='owned');
  const allBpm=vinyls.flatMap(v=>v.tracklist?v.tracklist.filter(t=>t.bpm).map(t=>parseInt(t.bpm)):[]);
  const avgBpm=allBpm.length?Math.round(allBpm.reduce((a,b)=>a+b,0)/allBpm.length):null;
  const mc={},ac={},ec={};
  vinyls.forEach(v=>{
    if(v.mood)mc[v.mood]=(mc[v.mood]||0)+1;
    if(v.artist)ac[v.artist]=(ac[v.artist]||0)+1;
    const e=getEra(v.year);if(e)ec[e]=(ec[e]||0)+1;
  });
  const maxM=Math.max(...Object.values(mc),1);
  const top=Object.entries(ac).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxA=Math.max(...top.map(x=>x[1]),1);
  const eL={'80s':'80s','88-94':'88–94','95-99':'95–99','00s':'2000s','10s':'2010s','20s':'2020s'};
  document.getElementById('statsContent').innerHTML=`
    <div class="ss"><h3>Overview</h3>
      <div class="sr"><span class="k">Total</span><span class="v">${vinyls.length}</span></div>
      <div class="sr"><span class="k">Owned</span><span class="v">${owned.length}</span></div>
      <div class="sr"><span class="k">Wishlist</span><span class="v">${vinyls.length-owned.length}</span></div>
      <div class="sr"><span class="k">Artists</span><span class="v">${Object.keys(ac).length}</span></div>
      ${avgBpm?`<div class="sr"><span class="k">Avg BPM</span><span class="v">${avgBpm}</span></div>`:''}
      ${allBpm.length?`<div class="sr"><span class="k">Tracks with BPM</span><span class="v">${allBpm.length}</span></div>`:''}
    </div>
    ${Object.keys(mc).length?`<div class="ss"><h3>By Style</h3><div class="bc">
      ${Object.entries(mc).sort((a,b)=>b[1]-a[1]).map(([k,c])=>`
        <div class="bi"><span class="bl">${esc(k)}</span>
        <div class="bt"><div class="bf" style="width:${(c/maxM*100).toFixed(1)}%"></div></div>
        <span class="bn">${c}</span></div>`).join('')}
    </div></div>`:''}
    ${top.length?`<div class="ss"><h3>Top Artists</h3><div class="bc">
      ${top.map(([k,c])=>`
        <div class="bi"><span class="bl">${esc(k)}</span>
        <div class="bt"><div class="bf bc2" style="width:${(c/maxA*100).toFixed(1)}%"></div></div>
        <span class="bn">${c}</span></div>`).join('')}
    </div></div>`:''}
    ${Object.keys(ec).length?`<div class="ss"><h3>By Era</h3>
      ${Object.entries(ec).sort().map(([k,c])=>`<div class="sr"><span class="k">${eL[k]||k}</span><span class="v">${c}</span></div>`).join('')}
    </div>`:''}`;
  document.getElementById('statsOverlay').classList.remove('hidden');
}

function openDevMode(){
  document.getElementById('devOverlay').classList.remove('hidden');

function refreshDevInfo(){
  const key=localStorage.getItem('bpm_api_key')||'—';
  const token=localStorage.getItem('discogs_token')||'—';
  const tracksTotal=vinyls.reduce((a,v)=>a+(v.tracklist?v.tracklist.length:0),0);
  const tracksWithBpm=vinyls.reduce((a,v)=>a+(v.tracklist?v.tracklist.filter(t=>t.bpm).length:0),0);
  const withCover=vinyls.filter(v=>v.coverUrl).length;
  const withRelId=vinyls.filter(v=>v.discogsReleaseId).length;
  document.getElementById('devInfo').innerHTML=`
    <div class="sr"><span class="k">Discogs token</span><span class="v" style="font-size:9px;word-break:break-all">${esc(token.slice(0,8))}...</span></div>
    <div class="sr"><span class="k">BPM key</span><span class="v" style="font-size:9px;word-break:break-all">${esc(key.slice(0,8))}...</span></div>
    <div class="sr"><span class="k">Vinyls</span><span class="v">${vinyls.length}</span></div>
    <div class="sr"><span class="k">With cover</span><span class="v">${withCover}</span></div>
    <div class="sr"><span class="k">With Discogs ID</span><span class="v">${withRelId}</span></div>
    <div class="sr"><span class="k">Total tracks</span><span class="v">${tracksTotal}</span></div>
    <div class="sr"><span class="k">Tracks with BPM</span><span class="v">${tracksWithBpm} / ${tracksTotal}</span></div>
    <div class="sr"><span class="k">localStorage size</span><span class="v">${(JSON.stringify(localStorage).length/1024).toFixed(1)} KB</span></div>
  `;
}

async function devTestBpm(){
  const key=localStorage.getItem('bpm_api_key');
  if(!key){document.getElementById('devTestResult').textContent='No BPM key configured.';return;}
  document.getElementById('devTestResult').textContent='Testing...';
  try{
    const url=`https://api.getsongbpm.com/search/?api_key=${key}&type=song&lookup=Nas+N.Y.+State+of+Mind`;
    const d=await bpmFetch(url);
    if(d.search&&d.search.length>0){
      const s=d.search[0];
      document.getElementById('devTestResult').textContent=`✓ API OK — found: "${s.title}" id:${s.id}`;
    } else if(d.error){
      document.getElementById('devTestResult').textContent=`✗ API error: ${JSON.stringify(d.error)}`;
    } else {
      document.getElementById('devTestResult').textContent=`? No results. Raw: ${JSON.stringify(d).slice(0,100)}`;
    }
  }catch(e){
    document.getElementById('devTestResult').textContent=`✗ Fetch error: ${e.message}`;
  }
}

async function devTestBpmSong(){
  const key=localStorage.getItem('bpm_api_key');
  const id=document.getElementById('devSongId').value.trim();
  if(!key||!id){document.getElementById('devTestResult').textContent='Need key + song ID.';return;}

function devExportData(){
  const blob=new Blob([JSON.stringify(vinyls,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='cratediggaz_backup.json';a.click();
}

function devImportData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!Array.isArray(imported))throw new Error('Invalid format');
        vinyls=imported;save();render();
        document.getElementById('devTestResult').textContent=`✓ Imported ${imported.length} vinyls.`;
        refreshDevInfo();
      }catch(e){document.getElementById('devTestResult').textContent=`✗ Import error: ${e.message}`;}
    };r.readAsText(f);
  };input.click();
}

function devClearBpms(){
  if(!confirm('Clear all track BPMs?'))return;
  vinyls.forEach(v=>{if(v.tracklist)v.tracklist.forEach(t=>t.bpm=null);});
  save();refreshDevInfo();
  document.getElementById('devTestResult').textContent='✓ All track BPMs cleared.';
}

function devClearAll(){
  if(!confirm('⚠️ Delete ALL vinyls? Cannot be undone.'))return;
  vinyls=[];save();render();closeModal('devOverlay');
}
